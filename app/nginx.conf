# nginx site config for the Expo Web static export.
#
# Expo Router with `web.output = "static"` precompiles a HTML file per
# concrete route, but dynamic segments (e.g. `app/song/[id].tsx`,
# `app/setlists/[id].tsx`) have no precomputed params here — direct hits
# on `/song/001-pana-chvalit-budu/` would 404 against nginx's defaults.
# The `try_files … /index.html` fallback hands them to the router so it
# can mount the right screen client-side.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for dynamic routes / client-side navigation reloads.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed Metro assets; never cache the entry HTML.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
