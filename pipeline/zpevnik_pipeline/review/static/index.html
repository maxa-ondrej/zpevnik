<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zpěvník Review</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.3/dist/abcjs-basic-min.js"></script>
  </head>
  <body>
    <div id="layout">
      <aside id="sidebar">
        <header>
          <h1>Zpěvník</h1>
          <input id="search" type="search" placeholder="Search…" autocomplete="off" />
        </header>
        <ul id="song-list" aria-live="polite"></ul>
      </aside>
      <main id="detail">
        <div class="empty">Select a song from the list.</div>
      </main>
    </div>
    <template id="detail-template">
      <header class="detail-head">
        <div class="meta-line">
          <span class="status" data-bind="reviewStatus"></span>
          <span class="id" data-bind="id"></span>
        </div>
        <h2 data-bind="title-display"></h2>
      </header>
      <section class="staves" hidden></section>
      <div class="preview-grid">
        <section class="preview-panel chordpro-panel">
          <header>
            <h3>Chord chart preview</h3>
            <div class="preview-controls" id="chordpro-controls">
              <div class="preview-control-group" role="group" aria-label="Notation">
                <button type="button" data-act="notation" data-value="cs">Cs</button>
                <button type="button" data-act="notation" data-value="en">En</button>
              </div>
              <div class="preview-control-group" role="group" aria-label="Transpose">
                <button type="button" data-act="transpose-down" aria-label="Transpose down">−</button>
                <span class="preview-transpose" id="chordpro-transpose-value">0</span>
                <button type="button" data-act="transpose-up" aria-label="Transpose up">+</button>
              </div>
              <span class="preview-status" id="chordpro-status"></span>
            </div>
          </header>
          <div id="chordpro-target" class="chordpro-target"></div>
        </section>
        <section class="preview-panel notation-panel">
          <header>
            <h3>Notation preview</h3>
            <span class="preview-status" id="notation-status"></span>
          </header>
          <div id="notation-target" class="notation-target"></div>
        </section>
      </div>
      <form id="edit-form">
        <div class="row">
          <label>Title<input name="title" type="text" required /></label>
          <label>Number<input name="number" type="number" min="1" /></label>
        </div>
        <div class="row">
          <label>Key<input name="key" type="text" placeholder="e.g. C, A, Bbm" /></label>
          <label>Tempo<input name="tempo" type="number" min="20" max="300" /></label>
        </div>
        <div class="editors">
          <label class="editor-chordpro">
            ChordPro
            <textarea name="chordpro" spellcheck="false" rows="18"></textarea>
          </label>
          <div class="editor-melody">
            <div class="editor-melody-head">
              <span class="field-label">melody.json</span>
              <span class="hint">structured</span>
            </div>
            <label>
              Header
              <textarea name="melodyHeader" spellcheck="false" rows="4"
                placeholder="X:1&#10;T:Title&#10;M:4/4&#10;L:1/4&#10;K:C"></textarea>
            </label>
            <div class="melody-blocks-label">Blocks</div>
            <div id="melody-blocks" class="melody-blocks"></div>
            <div class="melody-add-row" id="melody-add-row">
              <button type="button" data-add-type="verse">+ Verse</button>
              <button type="button" data-add-type="chorus">+ Chorus</button>
              <button type="button" data-add-type="bridge">+ Bridge</button>
            </div>
          </div>
        </div>
        <div class="row">
          <label>Review status
            <select name="reviewStatus">
              <option value="auto">auto</option>
              <option value="flagged">flagged</option>
              <option value="approved">approved</option>
            </select>
          </label>
          <div class="actions">
            <button type="button" id="reload">Reload</button>
            <button type="submit" id="save">Save</button>
          </div>
        </div>
        <p id="save-status" aria-live="polite"></p>
      </form>
    </template>
    <template id="block-template">
      <div class="melody-block">
        <header>
          <select data-act="type" aria-label="Block type">
            <option value="verse">Verse</option>
            <option value="chorus">Chorus</option>
            <option value="bridge">Bridge</option>
          </select>
          <span class="spacer"></span>
          <button type="button" data-act="up" aria-label="Move up" title="Move up">↑</button>
          <button type="button" data-act="down" aria-label="Move down" title="Move down">↓</button>
          <button type="button" data-act="delete" aria-label="Delete block" title="Delete block">✕</button>
        </header>
        <textarea data-act="body" rows="6" spellcheck="false"></textarea>
      </div>
    </template>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
