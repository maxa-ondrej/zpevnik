name: CI

"on":
  push:
  pull_request:

jobs:
  pipeline:
    name: Python pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy zpevnik_pipeline tests

      - name: Test (pytest)
        env:
          PYTHONPATH: .
        run: pytest tests/

  app:
    name: Expo/RN-Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Type-check (tsc)
        run: npx tsc --noEmit

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build reviewer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: pipeline/Dockerfile
          push: false
          tags: zpevnik-review:ci
          cache-from: type=gha,scope=reviewer
          cache-to: type=gha,scope=reviewer,mode=max

      - name: Build reader image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/Dockerfile
          push: false
          tags: zpevnik-reader:ci
          cache-from: type=gha,scope=reader
          cache-to: type=gha,scope=reader,mode=max
