name: CI

"on":
  push:
  pull_request:

jobs:
  pipeline:
    name: Python pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy zpevnik_pipeline tests

      - name: Test (pytest)
        env:
          PYTHONPATH: .
        run: pytest tests/

  app:
    name: Expo/RN-Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test (vitest)
        run: npm test

      - name: Type-check (tsc)
        run: npx tsc --noEmit
