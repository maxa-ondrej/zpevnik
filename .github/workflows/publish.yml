name: Publish

# On every push to main: build both Docker images, push to GHCR, then
# dispatch a `deploy` event to maxa-ondrej/majksa-ops so Coolify rolls
# the new version. PR builds are validated by ci.yml (push: false) so
# we don't double-build here.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  publish:
    name: Publish (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: app/Dockerfile
          - service: api
            dockerfile: pipeline/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zpevnik/${{ matrix.service }}
          # `prefix=` strips the default `sha-` so the image tag matches
          # the bare github.sha we send to majksa-ops as `version`.
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # Tell majksa-ops to update tag: in config/zpevnik/<service>/service.dev.yml
      # and chain into sync_config → rollout. Requires GH_PAT (a PAT
      # with `repo` scope on maxa-ondrej/majksa-ops) in this repo's
      # Actions secrets. Until that secret + the majksa-ops zpevnik
      # config are in place the step will fail — that's expected for
      # the first push; the image is already in GHCR and you can
      # provision majksa-ops manually with `gh workflow run`.
      - name: Dispatch deploy to majksa-ops
        uses: peter-evans/repository-dispatch@v3
        with:
          repository: maxa-ondrej/majksa-ops
          token: ${{ secrets.GH_PAT }}
          event-type: deploy
          client-payload: |
            {
              "env": "dev",
              "app": "zpevnik",
              "service": "${{ matrix.service }}",
              "version": "${{ github.sha }}"
            }
